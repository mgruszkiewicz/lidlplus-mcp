name: test

on:
  # Run on PRs standalone. On main/tags the build workflow calls this as a
  # gate (workflow_call), so we don't also trigger on push here — avoids a
  # duplicate run.
  pull_request:
  workflow_call:

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --dev

      - name: Run pytest
        run: uv run --frozen pytest
